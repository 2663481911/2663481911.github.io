<figure class="highlight js"><table><tbody><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-title">Person</span>(<span class="hljs-params">name, age</span>) </span>{<br>    <span class="hljs-built_in">this</span>.name = name;<br>    <span class="hljs-built_in">this</span>.age = age;<br>    <span class="hljs-built_in">this</span>.say = <span class="hljs-function">() =&gt;</span> <span class="hljs-built_in">console</span>.log(<span class="hljs-built_in">this</span>);<br><br>}<br><br><span class="hljs-comment">// 给类的实例定义方法</span><br>Person.prototype.showName = <span class="hljs-function"><span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) </span>{<br>    <span class="hljs-built_in">console</span>.log(<span class="hljs-built_in">this</span>.name);<br>}<br><br><span class="hljs-comment">// 定义类的静态方法</span><br>Person.eat = <span class="hljs-function"><span class="hljs-keyword">function</span> (<span class="hljs-params"></span>) </span>{<br>    <span class="hljs-built_in">console</span>.log(<span class="hljs-string">"eat....."</span>);<br>}<br><span class="hljs-comment">/**new的作用：</span><br><span class="hljs-comment"> *      1、创建一个对象</span><br><span class="hljs-comment"> *      2、调用构造方法，传入对应参数</span><br><span class="hljs-comment"> *      3、把this指向第一次创建的对象</span><br><span class="hljs-comment"> *      4、执行构造函数里面的代码</span><br><span class="hljs-comment"> */</span><br><span class="hljs-keyword">let</span> person = <span class="hljs-keyword">new</span> Person(<span class="hljs-string">'node'</span>, <span class="hljs-number">11</span>);<br>person.say()<br><br><span class="hljs-comment">// 继承</span><br><span class="hljs-function"><span class="hljs-keyword">function</span> <span class="hljs-title">Teacher</span>(<span class="hljs-params">name, age, subject</span>) </span>{<br>    <span class="hljs-comment">// 子类继承父类的属性，需要需要将this指向父类中的属性</span><br>    Person.call(<span class="hljs-built_in">this</span>, name, age)<br>    <span class="hljs-built_in">this</span>.subject = subject;<br>}<br><span class="hljs-comment">// 子类继承父类的方法</span><br>Teacher.prototype = <span class="hljs-keyword">new</span> Person()<br><br><span class="hljs-keyword">let</span> t = <span class="hljs-keyword">new</span> Teacher(<span class="hljs-string">'l'</span>, <span class="hljs-number">22</span>, <span class="hljs-string">'shuxue'</span>);<br>t.say()<br>t.showName()<br><span class="hljs-comment">// Teacher.eat()</span><br></code></pre></td></tr></tbody></table></figure>

<ul>

</ul>
<figure class="highlight js"><table><tbody><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br></pre></td><td class="code"><pre><code class="hljs js"><span class="hljs-comment">// ES6后</span><br><span class="hljs-comment">/**注意要点</span><br><span class="hljs-comment"> * 1、实例化方法和实例化属性都是给实例化对象调用，静态方法只能类名调用</span><br><span class="hljs-comment"> * 2、每一个实例化对象在内存中独立存在的，有自己的属性和方法，互不影响，相互独立</span><br><span class="hljs-comment"> * 3、</span><br><span class="hljs-comment"> * </span><br><span class="hljs-comment"> */</span><br><span class="hljs-class"><span class="hljs-keyword">class</span> <span class="hljs-title">Animal</span> </span>{ <span class="hljs-comment">// 定义一个类</span><br>    <span class="hljs-keyword">static</span> num = <span class="hljs-number">10</span>; <span class="hljs-comment">// 静态属性</span><br>    <span class="hljs-comment">// 构造器</span><br>    <span class="hljs-function"><span class="hljs-title">constructor</span>(<span class="hljs-params">name</span>)</span> {<br>        <span class="hljs-comment">// 实例化的时候执行</span><br>        <span class="hljs-built_in">this</span>.name = name; <span class="hljs-comment">// 实例属性</span><br>    }<br><br>    <span class="hljs-comment">// 定义一个实例方法</span><br>    <span class="hljs-function"><span class="hljs-title">showName</span>(<span class="hljs-params"></span>)</span> {<br>        <span class="hljs-built_in">console</span>.log(<span class="hljs-built_in">this</span>.name);<br>    }<br><br>    <span class="hljs-comment">// 静态方法，通过类名调用</span><br>    <span class="hljs-keyword">static</span> <span class="hljs-function"><span class="hljs-title">eat</span>(<span class="hljs-params"></span>)</span> {<br>        <span class="hljs-built_in">console</span>.log(<span class="hljs-string">'eat'</span>);<br>    }<br>}<br><br><br><span class="hljs-keyword">let</span> dog = <span class="hljs-keyword">new</span> Animal(<span class="hljs-string">'dog'</span>); <span class="hljs-comment">// 实例化对象</span><br>dog.showName(); <span class="hljs-comment">// dog, 调用实例方法</span><br>Animal.eat(); <span class="hljs-comment">// eat, 调用静态方法</span><br><span class="hljs-built_in">console</span>.log(Animal.num); <span class="hljs-comment">// 10, 调用静态属性</span><br><br><span class="hljs-comment">// ES6后</span><br><span class="hljs-comment">/**继承</span><br><span class="hljs-comment"> *  格式：class 子类名 extends 父类 {}</span><br><span class="hljs-comment"> */</span><br><span class="hljs-class"><span class="hljs-keyword">class</span> <span class="hljs-title">Cat</span> <span class="hljs-keyword">extends</span> <span class="hljs-title">Animal</span> </span>{<br>    <span class="hljs-function"><span class="hljs-title">constructor</span>(<span class="hljs-params">name</span>)</span> {<br>        <span class="hljs-comment">// 重写constructor方法使父类的constructor失效，</span><br>        <span class="hljs-comment">// 可以调用super()调用父类的constructor方法</span><br>        <span class="hljs-comment">// super()方法必须在使用this前面：this在调用父类的constructor方法才起作用</span><br>        <span class="hljs-built_in">super</span>(name);<br>        <span class="hljs-built_in">this</span>.age = <span class="hljs-number">10</span>;<br>    }<br>    <span class="hljs-comment">// 重写：子类方法名和父类一样，覆盖父类的方法，调用子类的方法</span><br>    <span class="hljs-function"><span class="hljs-title">showName</span>(<span class="hljs-params"></span>)</span> {<br>        <span class="hljs-built_in">console</span>.log(<span class="hljs-string">`<span class="hljs-subst">${<span class="hljs-built_in">this</span>.name}</span>:喵喵喵`</span>);<br>    }<br>}<br><br><span class="hljs-keyword">let</span> cat = <span class="hljs-keyword">new</span> Cat(<span class="hljs-string">"汤姆"</span>)<br>cat.showName() <span class="hljs-comment">// 汤姆:喵喵喵</span><br></code></pre></td></tr></tbody></table></figure>
